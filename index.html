<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Весілля Діана & Володимир</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fafafa;
    color: #222;
    text-align: center;
}

.hero {
    padding: 80px 20px;
}

h1 {
    font-size: 42px;
    font-weight: 300;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 18px;
    color: #666;
}

.section {
    padding: 50px 20px;
}

.box {
    background: white;
    max-width: 600px;
    margin: auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.countdown {
    font-size: 24px;
    margin-top: 10px;
}

iframe {
    width: 100%;
    height: 300px;
    border: 0;
    border-radius: 12px;
}
input, button {
    padding: 10px;
    margin: 5px;
    width: 80%;
}
button {
    cursor: pointer;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Діана & Володимир</h1>
    <div class="subtitle">22 серпня 2026 • Житомир, Міміно</div>
    <div class="countdown" id="countdown"></div>
</div>

<div class="section">
    <div class="box">
        <h2>Запрошення</h2>
        <p>Ми щасливі запросити вас на наш день весілля 💍</p>
    </div>
</div>

<div class="section">
    <div class="box">
        <h2>Локація</h2>
        <p>Ресторан “Міміно”, Житомир</p>
        <iframe 
            src="https://www.google.com/maps?q=Житомир+Міміно&output=embed">
        </iframe>
    </div>
</div>

<div class="section">
    <div class="box">
        <h2>Підтвердження присутності</h2>
        <input type="text" placeholder="Ваше імʼя">
        <input type="text" placeholder="Чи будете ви (так/ні)">
        <button onclick="alert('Дякуємо! 💍')">Надіслати</button>
    </div>
</div>

<script>
// Таймер
const weddingDate = new Date("Aug 22, 2026 00:00:00").getTime();

const x = setInterval(function() {
    const now = new Date().getTime();
    const distance = weddingDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));

    document.getElementById("countdown").innerHTML =
        "Залишилось " + days + " днів до весілля 💍";

    if (distance < 0) {
        clearInterval(x);
        document.getElementById("countdown").innerHTML = "Сьогодні наш день 💍";
    }
}, 1000);
</script>

</body>
</html>
